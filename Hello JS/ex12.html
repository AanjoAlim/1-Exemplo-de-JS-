<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>classlist.remove</title>
</head>
<style>
    .destaque{
        background-color: rgb(225, 255, 0);
        border-radius:  5px;
    }
</style>
<body>
    <p id="mensagem" class="destaque">texto com destaque</p>
    <button id="remover">remover destaque</button>

    <script>
        var paragrafo = document.getElementById("mensagem")
        var  botao = document.getElementById("remover")
        botao.addEventListener("click", function(){
            paragrafo.classList.remove("destaque")

        })
    </script>

</body>
</html>
