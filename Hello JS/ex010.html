<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>appendChild</title>
</head>
<body>

<div id="container"></div>

<ul id="lista"></ul>

<button id="adicionar">Adicionar item</button>

<script>
    var div = document.getElementById("container");
    var paragrafo = document.createElement("p");
    paragrafo.textContent = "Este parágrafo foi criado com JavaScript.";
    div.appendChild(paragrafo);

    var ul = document.getElementById("lista");
    var botao = document.getElementById("adicionar");

    botao.addEventListener("click", function () {
        var novoItem = document.createElement("li");
        novoItem.textContent = "Item Adicionado";
        ul.appendChild(novoItem);
    });
</script>

</body>
</html>
