<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

<form id="formulario">
    <input type="text" required>
    <button type="submit">Enviar</button>
    <br><br><br>

    <input type="text" id="campo">
    <br>
</form>

<p id="paragrafo">Passe o mouse aqui</p>

<script>
document.getElementById("formulario").addEventListener("submit", function(e){
    e.preventDefault();
    alert("Formulário interceptado");
});

document.getElementById("campo").addEventListener("keydown", function(e){
    console.log("Você apertou a tecla: " + e.key);
});

var p = document.getElementById("paragrafo");

p.addEventListener("mouseover", function(){
    p.textContent = "Abracadabra";
});

p.addEventListener("mouseout", function(){
    p.textContent = "Passe o mouse aqui";
});
</script>

</body>
</html>
